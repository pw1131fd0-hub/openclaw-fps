<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="OpenClaw FPS - 網頁第一人稱射擊遊戲">
  <meta name="theme-color" content="#0A0E17">
  <title>OpenClaw FPS</title>
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0A0E17;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #game-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0A0E17;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .loading-title {
      font-family: 'Orbitron', monospace;
      font-size: 3rem;
      color: #00D4FF;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      margin-bottom: 2rem;
    }
    
    .loading-bar-container {
      width: 300px;
      height: 6px;
      background-color: #1A1F2E;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #39FF14);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .loading-text {
      color: #8892A0;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    /* WebGL error screen */
    #error-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0A0E17;
      color: #FF3366;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 2000;
      text-align: center;
      padding: 2rem;
    }
    
    #error-screen h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    
    #error-screen p {
      color: #8892A0;
      max-width: 500px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    
    <div id="loading-screen">
      <h1 class="loading-title">OPENCLAW</h1>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-text" id="loading-text">載入中...</p>
    </div>
    
    <div id="error-screen">
      <h1>⚠️ WebGL 不支援</h1>
      <p>您的瀏覽器不支援 WebGL，無法執行此遊戲。請嘗試使用最新版本的 Chrome、Firefox 或 Safari。</p>
    </div>
    
    <div id="ui-container"></div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
